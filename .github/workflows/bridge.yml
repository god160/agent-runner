name: Network Bridge
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task script to run'
        required: true
  repository_dispatch:
    types: [run-task]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Task
        run: |
          python3 task.py 2>&1 | tee result.txt
      - name: Upload Result
        run: |
          echo "## Result" >> $GITHUB_STEP_SUMMARY
          cat result.txt >> $GITHUB_STEP_SUMMARY
      - name: Save Result as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-result
          path: result.txt
