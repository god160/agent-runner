name: Network Bridge
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task'
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Run Task
        run: python3 task.py 2>&1 | tee result.txt
      
      - name: Commit Result
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add result.txt screenshot.png 2>/dev/null || true
          git commit -m "result" || true
          git push || true
