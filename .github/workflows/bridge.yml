name: Network Bridge
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task script to run'
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: pip install requests
      
      - name: Run Task
        run: python3 task.py 2>&1 | tee result.txt
      
      - name: Commit Result
        run: |
          git config user.name "agent-bot"
          git config user.email "agent@bot.com"
          git add result.txt
          git commit -m "task result $(date +%s)" || true
          git push
